<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispute Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .main-container {
            max-width: 1200px;
            margin: 50px auto;
        }
        .scenario-sidebar {
            position: sticky;
            top: 20px;
        }
        .scenario-btn {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px 15px;
            font-size: 14px;
            text-align: left;
        }
        .scenario-btn:hover {
            transform: translateX(-5px);
            transition: transform 0.2s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-container">
            <h1 class="text-center mb-4">🏦 Dispute Management System</h1>
            <p class="text-center text-muted mb-4">AI-Powered Dispute Resolution using ReAct Pattern</p>

            <div class="row">
                <!-- Main Form Column -->
                <div class="col-lg-9">
                    <div class="card">
                        <div class="card-header">
                            <h5>Submit Dispute</h5>
                        </div>
                        <div class="card-body">
                            <form id="disputeForm">
                                <div class="mb-3">
                                    <label for="disputeType" class="form-label">Dispute Type</label>
                                    <select class="form-select" id="disputeType" name="disputeType" required>
                                        <option value="">Select type...</option>
                                        <option value="FRAUD">Fraud</option>
                                        <option value="MERCHANT">Merchant</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="transactionId" class="form-label">Transaction ID</label>
                                    <input type="text" class="form-control" id="transactionId" name="transactionId" required>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="amount" class="form-label">Amount</label>
                                        <input type="number" class="form-control" id="amount" name="amount" step="0.01" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="currency" class="form-label">Currency</label>
                                        <input type="text" class="form-control" id="currency" name="currency" value="INR" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="merchantName" class="form-label">Merchant Name (for Merchant disputes)</label>
                                    <input type="text" class="form-control" id="merchantName" name="merchantName">
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="customerNote" class="form-label">Customer Note</label>
                                    <textarea class="form-control" id="customerNote" name="customerNote" rows="3" required></textarea>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">Submit Dispute</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <a href="/review" class="btn btn-outline-secondary">View Human Review Queue</a>
                    </div>
                </div>

                <!-- Scenarios Sidebar Column -->
                <div class="col-lg-3">
                    <div class="scenario-sidebar">
                        <div class="card">
                            <div class="card-header bg-light">
                                <h6 class="mb-0">📋 Demo Scenarios</h6>
                            </div>
                            <div class="card-body p-2">
                                <button class="btn btn-outline-danger scenario-btn" onclick="loadScenario1()">
                                    🚨 Scenario 1<br>
                                    <small class="text-muted">Fraud Transaction</small>
                                </button>
                                <button class="btn btn-outline-warning scenario-btn" onclick="loadScenario2()">
                                    📦 Scenario 2<br>
                                    <small class="text-muted">Merchant Dispute</small>
                                </button>
                                <button class="btn btn-outline-success scenario-btn" onclick="loadScenario3()">
                                    ✅ Scenario 3<br>
                                    <small class="text-muted">Auto-Resolve Fraud</small>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadScenario1() {
            document.getElementById("disputeType").value = "FRAUD";
            document.getElementById("transactionId").value = "TXN-FRAUD-" + Date.now();
            document.getElementById("amount").value = "25000";
            document.getElementById("currency").value = "INR";
            document.getElementById("merchantName").value = "";
            document.getElementById("description").value = "₹25,000 debit card transaction in an unknown location — foreign country with no travel history";
            document.getElementById("customerNote").value = "I did not make this transaction. I was at home in Mumbai.";
        }

        function loadScenario2() {
            document.getElementById("disputeType").value = "MERCHANT";
            document.getElementById("transactionId").value = "TXN-MERCHANT-" + Date.now();
            document.getElementById("amount").value = "8000";
            document.getElementById("currency").value = "INR";
            document.getElementById("merchantName").value = "QuickShop India";
            document.getElementById("description").value = "₹8,000 e-commerce charge — Item not delivered";
            document.getElementById("customerNote").value = "Ordered 2 weeks ago. No delivery. Merchant not responding.";
        }

        function loadScenario3() {
            document.getElementById("disputeType").value = "FRAUD";
            document.getElementById("transactionId").value = "TXN-2026-FR-" + Date.now();
            document.getElementById("amount").value = "25000";
            document.getElementById("currency").value = "INR";
            document.getElementById("merchantName").value = "Foreign Merchant Malaysia";
            document.getElementById("description").value = "Unauthorized transaction in foreign country - Malaysia. Multiple fraud indicators detected.";
            document.getElementById("customerNote").value = "I did not make this transaction. I was at home in Mumbai. My card was stolen last week. This is clearly fraud with foreign location and unusual merchant.";
        }

        document.getElementById("disputeForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const formData = {
                disputeType: document.getElementById("disputeType").value,
                transactionId: document.getElementById("transactionId").value,
                amount: parseFloat(document.getElementById("amount").value),
                currency: document.getElementById("currency").value,
                merchantName: document.getElementById("merchantName").value,
                description: document.getElementById("description").value,
                customerNote: document.getElementById("customerNote").value
            };

            try {
                const response = await fetch("/api/disputes", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    const result = await response.json();
                    window.location.href = "/result?caseId=" + result.caseId;
                } else {
                    alert("Error submitting dispute. Please try again.");
                }
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
